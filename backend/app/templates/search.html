{% extends "base.html" %}
{% block title %}Search{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h5 mb-0">Search</h1>
</div>

<form class="card shadow-sm mb-3" method="get">
  <div class="card-body">
    <div class="row g-2 align-items-end">
      <div class="col-md-6">
        <label class="form-label small text-muted mb-1">Query</label>
        <input class="form-control form-control-sm" name="q" value="{{ q }}">
      </div>
      <div class="col-md-4">
        <label class="form-label small text-muted mb-1">Category</label>
        <select class="form-select form-select-sm" name="category">
          <option value="">All</option>
          {% for c in categories %}
            <option value="{{ c.slug }}" {% if category and category.slug == c.slug %}selected{% endif %}>{{ c.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-2 d-flex gap-2">
        <button class="btn btn-primary btn-sm" type="submit"><i class="bi bi-search me-1"></i>Search</button>
        <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('main.search') }}">Reset</a>
      </div>
    </div>
  </div>
</form>

<div class="row g-3">
  {% for p in projects %}
    <div class="col-md-4">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <div class="fw-semibold">{{ p.title }}</div>
          <div class="text-muted small mb-2">{{ p.short_desc }}</div>
          <div class="d-flex justify-content-between align-items-center">
            <span class="badge text-bg-light">₹{{ p.price_inr }}</span>
            <a class="btn btn-primary btn-sm" href="{{ url_for('main.project_detail', project_id=p._id) }}">View</a>
          </div>
        </div>
      </div>
    </div>
  {% else %}
    <div class="col-12 text-muted">No matching projects.</div>
  {% endfor %}
</div>

{% include "partials/pagination.html" %}
{% endblock %}
