{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h1 class="h5">Register</h1>
        <form method="post" action="{{ url_for('auth.register_post') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-2">
            <label class="form-label small">Email</label>
            <input class="form-control" name="email" type="email" required>
          </div>
          <div class="mb-2">
            <label class="form-label small">Password</label>
            <input class="form-control" name="password" type="password" required>
          </div>
          <div class="mb-2">
            <label class="form-label small">Confirm Password</label>
            <input class="form-control" name="password2" type="password" required>
          </div>
          <button class="btn btn-primary w-100 mt-2" type="submit">Create Account</button>
        </form>
        <div class="small text-muted mt-3">
          Already registered? <a href="{{ url_for('auth.login') }}">Login</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
