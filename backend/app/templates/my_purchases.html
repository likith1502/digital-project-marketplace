{% extends "base.html" %}
{% block title %}My Purchases{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h5 mb-0">My Purchases</h1>
</div>

<form class="card shadow-sm mb-3" method="get">
  <div class="card-body">
    <div class="row g-2 align-items-end">
      <div class="col-12 col-md-6">
        <label class="form-label small text-muted mb-1">Search (project title)</label>
        <input class="form-control form-control-sm" name="q" value="{{ q or '' }}" placeholder="Search your purchases">
      </div>
      <div class="col-12 col-md-6 d-flex gap-2">
        <button class="btn btn-primary btn-sm" type="submit"><i class="bi bi-search me-1"></i>Search</button>
        <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('payments.my_purchases') }}">Reset</a>
      </div>
    </div>
  </div>
</form>

<div class="row g-3">
  {% for row in purchases %}
    <div class="col-md-4">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <div class="fw-semibold">{{ row.proj.title }}</div>
          <div class="text-muted small mb-2">{{ row.proj.short_desc }}</div>
          <a class="btn btn-outline-primary btn-sm" href="{{ url_for('main.project_detail', project_id=row.proj._id) }}">Open</a>
        </div>
      </div>
    </div>
  {% else %}
    <div class="col-12 text-muted">No purchases yet.</div>
  {% endfor %}
</div>

{% include "partials/pagination.html" %}
{% endblock %}
